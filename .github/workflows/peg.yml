name: Peg — evening forecast

on:
  schedule:
    # 16:00 UTC — arrives at 5pm BST (summer) or 4pm GMT (winter),
    # early enough to load the washer for a morning hang.
    - cron: '0 16 * * *'
  workflow_dispatch:   # manual "Run now" from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the prediction log

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process yesterday's outcome
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python outcome.py

      - name: Send evening forecast
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2: ${{ secrets.TELEGRAM_CHAT_ID_2 }}
        run: python run.py

      - name: Commit log and offset
        # This commit keeps the scheduler alive (prevents 60-day auto-disable).
        # It's a no-op if neither file changed (e.g. on a same-day re-run).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add log.csv .peg_offset
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "log: $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
