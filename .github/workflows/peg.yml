name: Peg — morning forecast

on:
  schedule:
    # 07:45 UTC — arrives at 08:45 BST (summer) or 07:45 GMT (winter),
    # both comfortably before the 9am hang time.
    # Off the top of the hour to avoid GitHub Actions peak-load delays.
    - cron: '45 7 * * *'
  workflow_dispatch:   # manual "Run now" from the Actions tab

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the prediction log

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send morning verdict
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit prediction log
        # This commit keeps the scheduler alive (prevents 60-day auto-disable).
        # It's a no-op if the log didn't change (e.g. on a re-run of the same day).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add log.csv
          git diff --staged --quiet || git commit -m "log: $(date -u +%Y-%m-%d) prediction"
          git diff HEAD~1 --quiet 2>/dev/null || git push
