name: Peg — morning forecast

on:
  schedule:
    # 06:45 UTC — arrives at 06:45 GMT (winter) or 07:45 BST (summer),
    # both comfortably before the 9am hang time.
    # Off the top of the hour to avoid GitHub Actions peak-load delays.
    - cron: '45 6 * * *'
  workflow_dispatch:   # manual "Run now" from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the prediction log

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process yesterday's outcome
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python outcome.py

      - name: Send morning verdict
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit log and offset
        # This commit keeps the scheduler alive (prevents 60-day auto-disable).
        # It's a no-op if neither file changed (e.g. on a same-day re-run).
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add log.csv .peg_offset
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "log: $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
